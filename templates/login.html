<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h1>Password Hashing Authentication Demo</h1>

    <h2>Login</h2>

    <form method="POST">
        <label>Username:</label><br>
        <input type="text" name="username" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <button type="submit">Login</button>
    </form>

    <p>{{ message }}</p>

    <hr>

    <p>
        During login, the app does not decrypt the password.
        It checks whether the typed password matches the saved bcrypt hash.
    </p>

    <p>
        <a href="/register">Go to Register</a>
    </p>
</body>
</html>
