<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>
    <h1>Password Hashing Authentication Demo</h1>

    <h2>Register</h2>

    <form method="POST">
        <label>Username:</label><br>
        <input type="text" name="username" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <button type="submit">Register</button>
    </form>

    <p>{{ message }}</p>

    <hr>

    <p>
        This demo does not store the real password.
        It stores a bcrypt hashed password in the database.
    </p>
</body>
</html>
